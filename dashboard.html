<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH41R</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 280px;
    gap: 24px;
  }
  img { width: 100%; display: block; }
  p {
    font-size: 15px;
    color: #aaa;
    letter-spacing: 2px;
    text-align: center;
  }
  button {
    padding: 12px;
    background: #fff;
    color: #1a1a1a;
    border: 1.5px solid #1a1a1a;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  button:hover { background: #1a1a1a; color: #fff; }
</style>
</head>
<body>
  <div class="container">
    <img src="Logo.png" alt="CH41R"/>
    <p>welcome</p>
    <button onclick="window.location.href='/'">log out</button>
  </div>
</body>
</html>
