<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH41R</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logout { font-size: 13px; color: #6b7280; cursor: pointer; padding: 6px 12px; border-radius: 6px; border: 1px solid #e8eaed; background: #fff; transition: all .15s; }
  .logout:hover { background: #f0f2f5; }
  main { flex: 1; padding: 40px 32px; }
  h1 { font-size: 22px; font-weight: 700; color: #1a1d23; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .client-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04); padding: 24px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: transform .15s, box-shadow .15s; border: 1px solid transparent; }
  .client-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); border-color: #0ea5e9; }
  .client-logo { font-size: 22px; font-weight: 800; color: #0ea5e9; margin-bottom: 8px; }
  .client-name { font-size: 16px; font-weight: 600; color: #1a1d23; margin-bottom: 4px; }
  .client-desc { font-size: 13px; color: #6b7280; }
  .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: #dbeafe; color: #1d4ed8; margin-top: 10px; }
  body.hidden { visibility: hidden; }
</style>
</head>
<body class="hidden">
<header>
  <div class="brand">CH41R</div>
  <button class="logout" onclick="logout()">Log out</button>
</header>
<main>
  <h1>Welkom</h1>
  <p class="sub">Selecteer een klant om naar het dashboard te gaan.</p>
  <div class="grid">
    <a href="/pazzox" class="client-card">
      <div class="client-logo">Pazzox</div>
      <div class="client-name">Pazzox.be</div>
      <div class="client-desc">Online apotheek — omzet, marges & kanaalanalyse</div>
      <div class="tag">Revenue dashboard</div>
    </a>
  </div>
</main>
<script>
  fetch('/api/verify').then(r => {
    if (!r.ok) window.location.replace('/');
    else document.body.classList.remove('hidden');
  }).catch(() => window.location.replace('/'));
  function logout() {
    document.cookie = 'ch41r_session=; Path=/; Max-Age=0';
    window.location.replace('/');
  }
</script>
</body>
</html>
