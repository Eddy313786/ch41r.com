<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH41R</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .logo {
    width: 160px;
    height: 160px;
    margin-bottom: 48px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 280px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    background: #fff;
    color: #1a1a1a;
  }

  input:focus {
    border-color: #1a1a1a;
  }

  input::placeholder {
    color: #aaa;
  }

  button {
    margin-top: 4px;
    padding: 12px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }

  button:hover {
    opacity: 0.8;
  }
</style>
</head>
<body>

<svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer rounded square border -->
  <rect x="8" y="8" width="184" height="184" rx="32" ry="32"
        fill="none" stroke="#1a1a1a" stroke-width="12"/>

  <!-- Chair silhouette - 3/4 perspective view matching the logo -->
  <!-- Backrest panel (angled, top-left) -->
  <path d="M68 42 L108 36 L114 88 L74 94 Z" fill="#1a1a1a"/>
  <!-- Backrest cutout (white negative space) -->
  <rect x="72" y="60" width="38" height="18" rx="2" fill="#fff"/>

  <!-- Seat (wide, flat) -->
  <path d="M60 100 L148 94 L152 118 L56 124 Z" fill="#1a1a1a"/>

  <!-- Front-left leg -->
  <rect x="62" y="122" width="18" height="48" rx="6" fill="#1a1a1a"/>
  <!-- Front-right leg -->
  <rect x="126" y="118" width="18" height="46" rx="6" fill="#1a1a1a"/>
  <!-- Back-center leg (visible between front legs) -->
  <rect x="90" y="122" width="18" height="52" rx="6" fill="#1a1a1a"/>
</svg>

<form>
  <input type="email" placeholder="email" autocomplete="email"/>
  <input type="password" placeholder="password" autocomplete="current-password"/>
  <button type="submit">log in</button>
</form>

</body>
</html>
