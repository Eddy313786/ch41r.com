<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH41R</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: #fff;
  }

  /* ── Left panel ── */
  .left {
    width: 48%;
    min-width: 480px;
    display: flex;
    flex-direction: column;
    padding: 44px 64px;
    background: #fff;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }
  .logo-name {
    font-size: 20px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.3px;
  }

  .form-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 400px;
  }

  h1 {
    font-size: 34px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.8px;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 15px;
    color: #64748b;
    margin-bottom: 36px;
  }

  /* Floating label fields */
  .field {
    position: relative;
    margin-bottom: 18px;
  }
  .field input {
    width: 100%;
    height: 58px;
    padding: 22px 16px 8px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #0f172a;
    outline: none;
    transition: border-color .2s;
    background: #fff;
  }
  .field input:focus { border-color: #0d9488; }
  .field label {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: #94a3b8;
    pointer-events: none;
    transition: all .15s ease;
    font-weight: 500;
  }
  .field input:focus ~ label,
  .field input:not(:placeholder-shown) ~ label {
    top: 12px;
    transform: none;
    font-size: 11px;
    color: #0d9488;
    font-weight: 600;
    letter-spacing: .3px;
    text-transform: uppercase;
  }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 28px;
  }
  .forgot {
    font-size: 13px;
    color: #ef4444;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .btn-login {
    padding: 15px;
    background: #0d9488;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-login:hover { background: #0f766e; }

  .btn-request {
    padding: 15px;
    background: #fff;
    color: #0f172a;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .btn-request:hover { border-color: #0d9488; background: #f0fdfc; }

  .error-msg {
    font-size: 13px;
    color: #ef4444;
    font-weight: 500;
    min-height: 18px;
    margin-top: 4px;
  }

  .legal {
    margin-top: 36px;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.6;
  }

  /* ── Right panel ── */
  .right {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 0;
    margin: 16px 16px 16px 0;
    border-radius: 24px;
  }

  .right-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #042f2e 0%, #134e4a 40%, #0d9488 100%);
  }

  .right-pattern {
    position: absolute;
    inset: 0;
    opacity: .04;
    background-image: repeating-linear-gradient(
      -45deg, #fff 0, #fff 1px, transparent 0, transparent 12px
    );
  }

  /* Decorative circles */
  .circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
  }
  .c1 { width: 500px; height: 500px; bottom: -150px; right: -100px; }
  .c2 { width: 300px; height: 300px; top: -80px; left: -60px; }
  .c3 { width: 200px; height: 200px; top: 40%; left: 20%; background: rgba(255,255,255,.04); }

  .right-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 24px;
  }

  .right-logo {
    width: 120px;
    height: 120px;
    object-fit: contain;
    opacity: .2;
    filter: brightness(10);
  }

  .right-title {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    text-align: center;
    letter-spacing: -0.5px;
  }

  .right-sub {
    font-size: 15px;
    color: rgba(255,255,255,.6);
    text-align: center;
    line-height: 1.6;
    max-width: 260px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.3);
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    width: 380px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 80px rgba(0,0,0,.2);
  }
  .modal-title { font-size: 20px; font-weight: 800; color: #0f172a; }
  .modal-sub { font-size: 14px; color: #64748b; margin-top: -8px; }
  .modal input {
    padding: 14px 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }
  .modal input:focus { border-color: #0d9488; }
  .modal-msg { font-size: 13px; color: #64748b; text-align: center; min-height: 18px; }

  @media (max-width: 860px) {
    .right { display: none; }
    .left { width: 100%; min-width: unset; padding: 40px 32px; }
  }
</style>
</head>
<body>

<div class="left">
  <div class="logo-row">
    <img src="Logo.png" class="logo-img" alt="CH41R"/>
    <span class="logo-name">CH41R</span>
  </div>

  <div class="form-wrap">
    <h1>Welcome back!</h1>
    <p class="subtitle">Please log in to your account.</p>

    <form id="loginForm">
      <div class="field">
        <input type="text" id="username" placeholder=" " autocomplete="username"/>
        <label for="username">Username</label>
      </div>
      <div class="field">
        <input type="password" id="password" placeholder=" " autocomplete="current-password"/>
        <label for="password">Password</label>
      </div>
      <div class="row-between">
        <a class="forgot">Forgot password?</a>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-login">Login</button>
        <button type="button" class="btn-request" id="requestBtn">Request access</button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <p class="legal">By signing in you agree to our terms and that you have read our data policy.</p>
  </div>
</div>

<div class="right">
  <div class="right-bg"></div>
  <div class="right-pattern"></div>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="right-content">
    <img src="Logo.png" class="right-logo" alt=""/>
    <div class="right-title">CH41R Intelligence</div>
    <div class="right-sub">Data-driven decisions, beautifully presented.</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Request access</div>
    <div class="modal-sub">Enter your email and we'll reach out when approved.</div>
    <input type="email" id="requestEmail" placeholder="your@email.com"/>
    <button class="btn-login" id="sendRequest">Send request</button>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('errorMsg');
    err.textContent = '';
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    if (res.ok) {
      window.location.href = '/PazzoxHome';
    } else {
      err.textContent = 'Incorrect username or password.';
      document.getElementById('password').value = '';
    }
  });

  document.getElementById('requestBtn').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.add('active');
  });
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('active');
  });
  document.getElementById('sendRequest').addEventListener('click', async () => {
    const email = document.getElementById('requestEmail').value;
    const msg = document.getElementById('modalMsg');
    if (!email) return;
    const res = await fetch('/api/request-access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    msg.textContent = res.ok ? "Request sent — you'll hear from us soon." : 'Something went wrong.';
    if (res.ok) document.getElementById('sendRequest').disabled = true;
  });
</script>
</body>
</html>
